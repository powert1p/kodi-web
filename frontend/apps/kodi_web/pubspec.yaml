name: kodi_web
description: NIS Math — Flutter Web application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  kodi_core:
    path: ../../packages/kodi_core
  flutter_bloc: ^9.1.1
  go_router: ^14.8.1
  equatable: ^2.0.5
  shared_preferences: ^2.3.2
  flutter_math_fork: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
