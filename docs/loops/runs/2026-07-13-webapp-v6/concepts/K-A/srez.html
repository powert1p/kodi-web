<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kodi · Мини-срез</title>
<script>document.documentElement.classList.add('js')</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Days+One&family=Golos+Text:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --desk:#E3D6BD; --paper:#FBF8F3; --surface:#FFFDF9;
  --ink:#201D17; --text:#3D3A34; --muted:#6E685E; --muted-soft:#8A857C;
  --brand:#FF8C00; --brand-deep:#E67E00; --brand-soft:#FFF3E2; --brand-ink:#9A5A00;
  --success:#2E9E5B; --success-soft:#E9F6EE;
  --attn:#B7791F; --attn-soft:#FBF3E4; --attn-ink:#8A5712;
  --grid:#ECE4D4; --grid-2:#E4DAC6; --stroke:#E7DECB;
  --cell:23px;
  --lift:0 14px 34px -16px rgba(74,54,20,.30);
  --lift-sm:0 8px 20px -12px rgba(74,54,20,.22);
  --r-chip:8px; --r-ctrl:12px; --r-card:16px;
  --ease:cubic-bezier(.2,.72,.24,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--desk)}
body{font-family:'Golos Text',system-ui,sans-serif;color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.app{max-width:480px;margin:0 auto;position:relative;min-height:100dvh;background:var(--desk);display:flex;flex-direction:column}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.mascot{display:block}

/* стол-шапка с натюрмортом */
.deskhead{position:relative;height:158px;overflow:hidden;background:#c9a878}
.deskhead img{width:100%;height:100%;object-fit:cover;object-position:center 46%;display:block}
.deskhead::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(40,28,12,.32) 0%,rgba(40,28,12,0) 40%,rgba(227,214,189,0) 66%,var(--desk) 100%)}
.brandtab{position:absolute;top:16px;left:16px;z-index:2;background:var(--surface);border-radius:var(--r-chip);
  padding:7px 13px 8px;box-shadow:var(--lift-sm);transform:rotate(-2.5deg)}
.brandtab b{font-family:'Days One';font-size:17px;color:var(--ink)}
.brandtab .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--brand);margin-right:6px;vertical-align:1px}
.headkick{position:absolute;left:18px;bottom:15px;z-index:2;color:#fff6e9;font-family:'Days One';font-size:20px;text-shadow:0 2px 12px rgba(40,28,12,.6)}

/* страница-тетрадь */
.page{position:relative;flex:1;border-radius:22px 22px 0 0;background-color:var(--paper);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:var(--cell) var(--cell);background-position:12px 0;padding:22px 18px 26px;margin-top:-24px}
.page::before{content:"";position:absolute;left:0;right:0;top:0;height:22px;border-radius:22px 22px 0 0;
  background:linear-gradient(180deg,rgba(255,255,255,.7),rgba(255,255,255,0));pointer-events:none}

/* заголовок среза — крупный номер вопроса */
.srow{display:flex;align-items:center;gap:14px}
.srow .big{font-family:'Days One';font-size:54px;color:var(--ink);line-height:.8;position:relative}
.srow .slab{display:flex;flex-direction:column;gap:2px}
.srow .slab .l1{font-family:'Days One';font-size:19px;color:var(--ink);line-height:1}
.srow .slab .l2{font-size:14px;font-weight:700;color:var(--muted)}
.srow .umark{display:block;width:52px;height:9px;margin-top:1px}
.srow .umark path{stroke:var(--brand);fill:none;stroke-width:7;stroke-linecap:round}

/* маршрут: 12 точек пути + флажок (сигнатура) */
.trailwrap{margin:16px 0 4px;background:var(--surface);border:1px solid var(--stroke);border-radius:var(--r-card);
  padding:16px 14px 13px;box-shadow:var(--lift-sm)}
.trailwrap .tl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.trailwrap .tl-top .you{font-size:13px;font-weight:700;color:var(--brand-ink)}
.trailwrap .tl-top .fin{font-size:13px;font-weight:600;color:var(--muted)}
#trail{width:100%;height:66px;display:block;overflow:visible}

/* тема */
.theme{display:inline-flex;align-items:center;gap:8px;margin:20px 0 12px;background:var(--brand-soft);
  border-radius:99px;padding:8px 15px}
.theme .k{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--brand-ink)}
.theme .v{font-size:15px;font-weight:700;color:var(--ink)}

/* задача */
.qcard{position:relative;background:var(--surface);border:1px solid #f0d9b3;border-radius:var(--r-card);
  padding:22px 18px;box-shadow:var(--lift)}
.qcard .qn{position:absolute;top:-13px;left:18px;font-family:'Days One';font-size:12px;color:var(--ink);
  background:var(--brand);border-radius:99px;padding:5px 13px}
.qcard .q{font-size:20px;line-height:1.46;color:var(--ink);font-weight:500;margin-top:4px}

/* ответ */
.answer{margin-top:18px}
.answer label{display:block;font-size:14px;font-weight:700;color:var(--muted);margin-bottom:7px}
.answer input{width:100%;height:58px;border:1.5px solid var(--stroke);border-radius:13px;background:var(--surface);
  padding:0 16px;font-family:'Golos Text';font-size:19px;color:var(--ink)}
.answer input::placeholder{color:var(--muted)}
.answer input:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.check{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;min-height:58px;margin-top:13px;
  border:0;cursor:pointer;background:var(--brand);color:var(--ink);border-radius:14px;
  font-family:'Golos Text';font-size:19px;font-weight:800;box-shadow:var(--lift-sm);transition:background .15s,transform .12s var(--ease)}
.check:hover{background:var(--brand-deep)}
.check:active{transform:translateY(1px)}
.check:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
.check svg{width:21px;height:21px}
.hint{margin-top:12px;text-align:center;font-size:13.5px;color:var(--muted)}

/* нижняя навигация */
.tabbar{position:relative;width:100%;z-index:30;display:flex;background:var(--surface);border-top:1px solid var(--stroke);
  box-shadow:0 -10px 24px -18px rgba(74,54,20,.4);padding:9px 12px calc(11px + env(safe-area-inset-bottom))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:52px;justify-content:center;
  border:0;background:none;cursor:pointer;color:var(--muted);font-family:'Golos Text';font-size:12px;font-weight:700;border-radius:12px;position:relative}
.tab svg{width:24px;height:24px}
.tab.on{color:var(--brand-ink)}
.tab.on::before{content:"";position:absolute;top:2px;width:30px;height:4px;border-radius:99px;background:var(--brand)}
.tab:focus-visible{outline:3px solid var(--ink);outline-offset:2px}

@media (prefers-reduced-motion:no-preference){
  .js .reveal{opacity:0;transform:translateY(15px)}
  .pulse{animation:pulse 2.2s var(--ease) infinite}
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.16);opacity:.68}}
</style>
</head>
<body>
<div class="app">

  <header class="deskhead reveal">
    <img src="assets/srez-still.png" alt="Мандарин и оранжевый маркер на клетчатой странице">
    <div class="brandtab"><span class="dot"></span><b>Kodi</b></div>
    <div class="headkick">Мини-срез</div>
  </header>

  <main class="page">

    <div class="srow reveal">
      <div>
        <span class="big tnum">1</span>
        <svg class="umark" viewBox="0 0 52 9" aria-hidden="true"><path d="M3 6 C 14 2, 34 8, 49 4"/></svg>
      </div>
      <div class="slab">
        <span class="l1">вопрос</span>
        <span class="l2 tnum">из 12</span>
      </div>
    </div>

    <!-- маршрут: 12 точек пути, ты на 1-й, финал — флажок -->
    <section class="trailwrap reveal">
      <div class="tl-top">
        <span class="you">Ты на 1-й точке</span>
        <span class="fin">впереди 11 · финиш — флажок</span>
      </div>
      <svg id="trail" viewBox="0 0 340 66" aria-label="Пройдено 0 из 12, ты на первой точке"></svg>
    </section>

    <div class="theme reveal"><span class="k">Тема</span><span class="v">Цифры числа (разряды, количество)</span></div>

    <article class="qcard reveal">
      <span class="qn">Задача</span>
      <p class="q">Найдите двузначное число, если оно равно удвоенному произведению своих цифр.</p>
    </article>

    <div class="answer reveal">
      <label for="ans">Твой ответ</label>
      <input id="ans" type="text" inputmode="numeric" placeholder="Введи число" autocomplete="off">
      <button class="check" type="button">Проверить
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <p class="hint">Реши в тетради рядом, потом впиши ответ.</p>
    </div>
  </main>

  <nav class="tabbar" aria-label="Разделы">
    <button class="tab on" type="button" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2.5" stroke="currentColor" stroke-width="2"/><path d="M4 10h16M10 4v16" stroke="currentColor" stroke-width="1.6"/></svg>Срез
    </button>
    <button class="tab" type="button">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 18c4 0 4-9 8-9s4 5 8 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><circle cx="4" cy="18" r="1.8" fill="currentColor"/><circle cx="20" cy="14" r="1.8" fill="currentColor"/></svg>Прогресс
    </button>
  </nav>
</div>

<script>
/* маршрут среза: 12 честных точек по клетке + флажок, ты на 1-й */
(function(){
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const NS='http://www.w3.org/2000/svg';
  function drawTrail(){
    const svg=document.getElementById('trail');if(!svg)return;
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    const N=12, x0=14, x1=306, cy=34;
    const step=(x1-x0)/(N-1);
    const pts=[];for(let i=0;i<N;i++){pts.push({x:x0+i*step, y:cy+(i%2? 7:-7)});}
    // пунктирный «карандашный» план через все точки
    let d=`M ${pts[0].x} ${pts[0].y}`;
    for(let i=1;i<N;i++){const mx=(pts[i-1].x+pts[i].x)/2;d+=` Q ${mx} ${pts[i-1].y} ${pts[i].x} ${pts[i].y}`;}
    const ahead=document.createElementNS(NS,'path');ahead.setAttribute('d',d);ahead.setAttribute('fill','none');
    ahead.setAttribute('stroke','var(--grid-2)');ahead.setAttribute('stroke-width','3');ahead.setAttribute('stroke-linecap','round');ahead.setAttribute('stroke-dasharray','1 9');svg.appendChild(ahead);
    // сплошной маркер — заход до текущей (1-й) точки: 0 пройдено
    const lead=`M 2 ${pts[0].y} L ${pts[0].x} ${pts[0].y}`;
    const bleed=document.createElementNS(NS,'path');bleed.setAttribute('d',lead);bleed.setAttribute('fill','none');bleed.setAttribute('stroke','var(--brand)');bleed.setAttribute('stroke-width','11');bleed.setAttribute('stroke-linecap','round');bleed.setAttribute('opacity','.22');svg.appendChild(bleed);
    const core=document.createElementNS(NS,'path');core.setAttribute('d',lead);core.setAttribute('fill','none');core.setAttribute('stroke','var(--brand)');core.setAttribute('stroke-width','5.5');core.setAttribute('stroke-linecap','round');svg.appendChild(core);
    // точки
    pts.forEach((p,i)=>{
      if(i===0){
        const halo=document.createElementNS(NS,'circle');halo.setAttribute('cx',p.x);halo.setAttribute('cy',p.y);halo.setAttribute('r',10);halo.setAttribute('fill','none');halo.setAttribute('stroke','var(--brand)');halo.setAttribute('stroke-width','2.6');halo.setAttribute('opacity','.55');if(!reduce){halo.setAttribute('class','pulse');halo.style.transformOrigin=`${p.x}px ${p.y}px`;}
        const dot=document.createElementNS(NS,'circle');dot.setAttribute('cx',p.x);dot.setAttribute('cy',p.y);dot.setAttribute('r',5.6);dot.setAttribute('fill','var(--brand)');dot.setAttribute('stroke','var(--surface)');dot.setAttribute('stroke-width','2');
        svg.appendChild(halo);svg.appendChild(dot);
      }else{
        const c=document.createElementNS(NS,'circle');c.setAttribute('cx',p.x);c.setAttribute('cy',p.y);c.setAttribute('r',4.6);c.setAttribute('fill','var(--surface)');c.setAttribute('stroke','var(--grid-2)');c.setAttribute('stroke-width','2.2');svg.appendChild(c);
      }
    });
    // флажок на финише
    const fx=pts[N-1].x+16, fy=pts[N-1].y;
    const pole=document.createElementNS(NS,'line');pole.setAttribute('x1',fx);pole.setAttribute('y1',fy+9);pole.setAttribute('x2',fx);pole.setAttribute('y2',fy-16);pole.setAttribute('stroke','var(--ink)');pole.setAttribute('stroke-width','2.6');pole.setAttribute('stroke-linecap','round');svg.appendChild(pole);
    const flag=document.createElementNS(NS,'path');flag.setAttribute('d',`M ${fx} ${fy-15} L ${fx+15} ${fy-11} L ${fx} ${fy-6} Z`);flag.setAttribute('fill','var(--brand)');svg.appendChild(flag);
    const base=document.createElementNS(NS,'circle');base.setAttribute('cx',fx);base.setAttribute('cy',fy+9);base.setAttribute('r',3);base.setAttribute('fill','var(--ink)');svg.appendChild(base);
    // рисование
    if(!reduce){
      [bleed,core].forEach(p=>{const L=p.getTotalLength();p.style.strokeDasharray=L;p.style.strokeDashoffset=L;p.getBoundingClientRect();p.style.transition='stroke-dashoffset .8s var(--ease) .3s';p.style.strokeDashoffset='0';});
      ahead.style.opacity='0';ahead.getBoundingClientRect();ahead.style.transition='opacity .8s ease-out .5s';ahead.style.opacity='1';
    }
  }
  function reveal(){if(reduce){document.querySelectorAll('.reveal').forEach(e=>e.style.opacity=1);return;}
    document.querySelectorAll('.reveal').forEach((el,i)=>{setTimeout(()=>{el.style.transition='opacity .55s var(--ease),transform .55s var(--ease)';el.style.opacity='1';el.style.transform='none';},70*i);});}
  function run(){reveal();drawTrail();}
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(()=>setTimeout(run,30));}else window.addEventListener('load',run);
  window.addEventListener('load',()=>setTimeout(drawTrail,400));
  let t;window.addEventListener('resize',()=>{clearTimeout(t);t=setTimeout(drawTrail,150)});
})();
</script>
</body>
</html>
