<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500">
  <rect width="1200" height="1500" fill="#f8f5e9"/>
  <g stroke="#b6d1df" stroke-width="2" opacity="0.65">
    <path d="M0 210H1200M0 330H1200M0 450H1200M0 570H1200M0 690H1200M0 810H1200M0 930H1200M0 1050H1200M0 1170H1200M0 1290H1200M0 1410H1200"/>
  </g>
  <path d="M150 0V1500" stroke="#df9d9d" stroke-width="3" opacity="0.72"/>
  <g transform="rotate(-0.25 600 750)" fill="#203f76" font-family="DejaVu Sans, sans-serif" font-style="italic">
    <text x="205" y="155" font-size="46">Смешиваем два сиропа</text>
    <text x="225" y="330" font-size="58">1) 200 × 10% = 20 г сахара</text>
    <text x="225" y="500" font-size="58">2) 300 × 20% = 60 г сахара</text>
    <text x="225" y="670" font-size="58">3) 20 + 60 = 80 г сахара</text>
    <text x="225" y="840" font-size="58">4) 200 + 300 = 500 г смеси</text>
    <text x="225" y="1010" font-size="64">5) 80 ÷ 500 × 100% = 16%</text>
    <path d="M220 1045 C470 1055 755 1052 1035 1040" fill="none" stroke="#203f76" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <text x="205" y="1250" font-size="62">Ответ: концентрация 16%</text>
  </g>
</svg>
