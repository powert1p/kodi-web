<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500">
  <rect width="1200" height="1500" fill="#f8f5e9"/>
  <g stroke="#b6d1df" stroke-width="2" opacity="0.65">
    <path d="M0 210H1200M0 330H1200M0 450H1200M0 570H1200M0 690H1200M0 810H1200M0 930H1200M0 1050H1200M0 1170H1200M0 1290H1200M0 1410H1200"/>
  </g>
  <path d="M150 0V1500" stroke="#df9d9d" stroke-width="3" opacity="0.72"/>
  <g transform="rotate(-0.4 600 750)" fill="#203f76" font-family="DejaVu Sans, sans-serif" font-style="italic">
    <text x="205" y="155" font-size="46">Концентрация смеси</text>
    <text x="205" y="292" font-size="50">1) Масса соли в растворах:</text>
    <text x="250" y="412" font-size="62">200 · 0,10 = 20 г</text>
    <text x="250" y="532" font-size="62">300 · 0,20 = 60 г</text>
    <text x="205" y="712" font-size="50">2) 20 + 60 = 80 г соли</text>
    <text x="205" y="892" font-size="50">3) 200 + 300 = 500 г смеси</text>
    <text x="205" y="1072" font-size="58">4) 80 : 500 · 100 = 16%</text>
    <path d="M205 1100 C430 1112 715 1107 980 1098" fill="none" stroke="#203f76" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <text x="205" y="1280" font-size="62">Ответ: 16%</text>
  </g>
</svg>
