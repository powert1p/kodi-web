<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Learning path concepts</title>
  <style>
    @font-face { font-family: Onest; src: url('../../../../webapp/src/theme/fonts/onest-variable.woff2') format('woff2'); font-display: swap; }
    @font-face { font-family: Tektur; src: url('../../../../webapp/src/theme/fonts/tektur-variable.woff2') format('woff2'); font-display: swap; }
    :root { --ink:#17312e; --text:#29423e; --muted:#566a64; --paper:#f5f1e7; --paper2:#ebe6d9; --surface:#fffdf7; --line:#d5cfc0; --orange:#ff9f2f; --orange-deep:#a44d08; --orange-soft:#ffe0b6; --sage:#e1eee5; --sage-deep:#3a7055; }
    * { box-sizing:border-box; }
    html,body { margin:0; min-width:320px; min-height:100%; background:var(--paper); color:var(--text); font-family:Onest,system-ui,sans-serif; }
    body::before { position:fixed; inset:0; pointer-events:none; background:radial-gradient(circle at 12% 5%,rgba(255,255,255,.9),transparent 31%),radial-gradient(rgba(23,49,46,.1) .55px,transparent .55px); background-size:auto,9px 9px; opacity:.55; content:""; }
    button,input { font:inherit; }
    .shell { position:relative; min-height:100vh; }
    .top { display:flex; align-items:center; justify-content:space-between; max-width:1180px; margin:auto; padding:22px 24px; }
    .brand { display:flex; align-items:center; gap:9px; color:var(--ink); font-weight:800; letter-spacing:-.045em; }
    .seed { display:grid; width:35px; height:35px; place-items:center; border-radius:48% 44% 53% 39%; background:var(--ink); color:var(--surface); transform:rotate(-7deg); }
    .seed b { transform:rotate(7deg); }
    .mini { color:var(--muted); font-size:13px; font-weight:650; }
    .mark { color:var(--orange-deep); font-family:Tektur,system-ui; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; }
    h1,h2,p { margin:0; }
    h1 { color:var(--ink); font-size:clamp(38px,6vw,68px); line-height:.98; letter-spacing:-.06em; }
    h2 { color:var(--ink); font-size:clamp(27px,4vw,42px); line-height:1.03; letter-spacing:-.045em; }
    .lead { font-size:18px; line-height:1.55; }
    .button { display:inline-flex; min-height:54px; align-items:center; justify-content:center; border:0; border-radius:14px; padding:0 22px; background:var(--orange); color:var(--ink); font-weight:760; box-shadow:0 5px 0 #d9781d; }
    .formula { color:var(--ink); font-family:Tektur,Onest,sans-serif; font-weight:650; letter-spacing:-.04em; }
    .progress { height:7px; overflow:hidden; border-radius:999px; background:var(--paper2); }
    .progress span { display:block; width:20%; height:100%; border-radius:inherit; background:var(--orange); }
    .input { min-height:58px; width:100%; border:1.5px solid #9fa9a4; border-radius:14px; background:var(--surface); padding:0 16px; color:var(--ink); font-size:18px; }
    .bottom { display:none; }

    /* A: open focus track */
    .a-main { display:grid; grid-template-columns:minmax(0,760px) 240px; gap:56px; max-width:1120px; margin:36px auto 0; padding:0 24px 80px; }
    .a-contract { position:relative; overflow:hidden; border:1px solid rgba(23,49,46,.14); border-radius:12px 34px 34px 12px; background:var(--surface); padding:48px; box-shadow:0 28px 70px -46px rgba(23,49,46,.45); }
    .a-contract::before { position:absolute; inset:25px auto 25px 0; width:6px; border-radius:0 6px 6px 0; background:var(--orange); content:""; }
    .a-contract .lead { max-width:600px; margin-top:24px; }
    .meta { display:flex; flex-wrap:wrap; gap:10px 24px; margin:30px 0 32px; color:var(--muted); font-size:14px; }
    .a-rail { padding-top:15px; }
    .rail-title { margin-bottom:22px; font-weight:700; color:var(--ink); }
    .rail { list-style:none; margin:0; padding:0; }
    .rail li { position:relative; min-height:72px; padding-left:40px; color:var(--muted); font-size:14px; }
    .rail li::before { position:absolute; left:7px; top:4px; width:14px; height:14px; border:3px solid var(--paper); border-radius:50%; outline:1px solid var(--line); background:var(--line); content:""; }
    .rail li::after { position:absolute; left:13px; top:21px; bottom:0; width:1px; background:var(--line); content:""; }
    .rail li:last-child::after { display:none; }
    .rail li.active { color:var(--ink); font-weight:720; }
    .rail li.active::before { background:var(--orange); outline-color:var(--orange-deep); }
    .a-lesson { display:grid; grid-template-columns:190px minmax(0,720px); gap:48px; max-width:1030px; margin:24px auto; padding:0 24px 80px; }
    .phase { position:sticky; top:24px; align-self:start; }
    .phase .big { margin:10px 0 16px; color:var(--ink); font:680 38px/1 Tektur; }
    .work { border:1px solid rgba(23,49,46,.14); border-radius:10px 30px 30px 10px; background:var(--surface); padding:42px; box-shadow:0 24px 64px -44px rgba(23,49,46,.45); }
    .work .story { margin:18px 0 28px; font-size:20px; line-height:1.5; }
    .known { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:24px 0; }
    .known div { border-radius:16px; background:var(--sage); padding:16px; }
    .known strong { display:block; margin-top:4px; color:var(--ink); font:660 25px/1.2 Tektur; }
    .question { margin:26px 0 16px; color:var(--ink); font-size:19px; font-weight:700; }
    .answer-row { display:grid; grid-template-columns:1fr auto; gap:12px; }
    .answer-note { margin-top:11px; color:var(--muted); font-size:13px; line-height:1.45; }
    .input.wrong { border-color:#bb542e; background:#fff8f4; color:#8f351d; }
    .feedback { margin-top:16px; border-left:4px solid #bb542e; border-radius:0 14px 14px 0; background:#fff1e9; padding:14px 16px; color:#71311d; line-height:1.45; }
    .feedback strong { display:block; margin-bottom:4px; color:#6a2917; }
    .hint { margin-top:16px; border-radius:18px; background:var(--sage); padding:16px 18px; color:var(--text); line-height:1.5; }
    .hint strong { display:block; margin-bottom:5px; color:var(--ink); }
    .ratio { display:grid; grid-template-columns:1fr 1fr; overflow:hidden; margin-top:16px; border:1px solid #aac2b2; border-radius:15px; background:var(--surface); }
    .ratio div { padding:12px 14px; border-bottom:1px solid #cbd9cf; }
    .ratio div:nth-last-child(-n+2) { border-bottom:0; }
    .ratio div:nth-child(odd) { border-right:1px solid #cbd9cf; color:var(--muted); }
    .ratio strong { color:var(--ink); font:650 18px/1 Tektur; }
    .saved { display:inline-flex; align-items:center; gap:7px; margin:18px 0 4px; border-radius:999px; background:var(--sage); padding:8px 12px; color:var(--sage-deep); font-size:13px; font-weight:720; }
    .saved::before { content:"✓"; }
    .result { max-width:820px; margin:34px auto 80px; padding:0 24px; }
    .result-card { position:relative; overflow:hidden; border:1px solid rgba(23,49,46,.14); border-radius:12px 34px 34px 12px; background:var(--surface); padding:48px; box-shadow:0 28px 70px -46px rgba(23,49,46,.45); }
    .result-card::before { position:absolute; inset:25px auto 25px 0; width:6px; border-radius:0 6px 6px 0; background:var(--sage-deep); content:""; }
    .evidence { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:28px 0 30px; }
    .evidence div { border-radius:17px; background:var(--paper); padding:16px; }
    .evidence strong { display:block; margin-bottom:5px; color:var(--ink); font:650 22px/1.1 Tektur; }
    .result-foot { display:flex; align-items:center; justify-content:space-between; gap:22px; }

    /* B: notebook spread */
    .b-wrap { max-width:1140px; margin:24px auto 80px; padding:0 24px; }
    .tabs { display:flex; gap:5px; padding-left:22px; }
    .tab { border-radius:12px 12px 0 0; background:var(--paper2); padding:9px 17px; color:var(--muted); font:680 11px/1 Tektur; text-transform:uppercase; }
    .tab.active { background:var(--orange-soft); color:var(--orange-deep); }
    .spread { position:relative; display:grid; grid-template-columns:1fr 1fr; min-height:610px; border:1px solid rgba(23,49,46,.15); border-radius:28px; background:var(--surface); box-shadow:0 28px 80px -50px rgba(23,49,46,.5); }
    .spread::after { position:absolute; top:24px; bottom:24px; left:50%; width:1px; background:linear-gradient(transparent,var(--line) 12%,var(--line) 88%,transparent); content:""; }
    .page { padding:46px; background-image:linear-gradient(rgba(23,49,46,.045) 1px,transparent 1px); background-size:100% 31px; }
    .page:first-child { border-radius:28px 0 0 28px; }
    .page:last-child { border-radius:0 28px 28px 0; }
    .b-wrap h1 { max-width:520px; }
    .note { margin-top:30px; border-left:4px solid var(--orange); padding:4px 0 4px 16px; color:var(--ink); font-size:17px; line-height:1.55; }
    .equation { margin:38px 0; color:var(--ink); font:650 clamp(27px,4vw,44px)/1.2 Tektur; }
    .teacher { display:inline-block; transform:rotate(-2deg); border-radius:8px; background:var(--orange-soft); padding:7px 10px; color:var(--orange-deep); font:650 12px/1 Tektur; }
    .b-actions { display:flex; align-items:center; justify-content:space-between; gap:20px; margin-top:32px; }

    /* C: path map */
    .c-main { display:grid; grid-template-columns:minmax(0,660px) 330px; gap:72px; max-width:1090px; margin:30px auto 80px; padding:0 24px; }
    .route-map { position:relative; margin-top:42px; padding-left:58px; }
    .route-map::before { position:absolute; top:16px; bottom:22px; left:20px; width:4px; border-radius:99px; background:var(--sage-deep); content:""; opacity:.35; }
    .stop { position:relative; min-height:120px; padding:0 0 28px 26px; }
    .stop::before { position:absolute; top:0; left:-51px; display:grid; width:32px; height:32px; place-items:center; border:4px solid var(--paper); border-radius:50%; outline:2px solid var(--sage-deep); background:var(--paper); color:var(--sage-deep); font:700 12px/1 Tektur; content:attr(data-n); }
    .stop.active::before { outline-color:var(--orange-deep); background:var(--orange); color:var(--ink); }
    .stop h3 { margin:0 0 7px; color:var(--ink); font-size:19px; }
    .stop p { color:var(--muted); line-height:1.45; }
    .ticket { position:sticky; top:28px; align-self:start; border:1px solid rgba(23,49,46,.15); border-radius:28px; background:var(--surface); padding:30px; box-shadow:0 24px 60px -42px rgba(23,49,46,.5); }
    .ticket h2 { margin:14px 0 18px; font-size:31px; }
    .ticket .button { width:100%; margin-top:26px; }
    .c-lesson { max-width:900px; margin:24px auto 80px; padding:0 24px; }
    .crumbs { display:flex; align-items:center; gap:10px; margin-bottom:22px; color:var(--muted); font-size:13px; }
    .crumbs b { color:var(--ink); }
    .c-task { display:grid; grid-template-columns:1fr 270px; gap:36px; border-radius:30px; background:var(--sage); padding:42px; }
    .c-task .side { border-radius:20px; background:rgba(255,253,247,.7); padding:20px; }
    .c-task .answer-row { grid-template-columns:1fr; }

    @media (max-width:720px) {
      .top { padding:17px 18px; }
      .mini { max-width:130px; text-align:right; }
      h1 { font-size:42px; }
      .a-main,.a-lesson,.c-main { display:block; margin-top:15px; padding:0 17px 110px; }
      .a-contract { padding:31px 25px 28px; border-radius:9px 26px 26px 9px; }
      .a-contract .lead { margin-top:18px; font-size:16px; }
      .meta { margin:22px 0 26px; }
      .a-rail { margin-top:26px; padding:0 8px; }
      .rail { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
      .rail li { min-height:44px; padding:21px 0 0; text-align:center; font-size:10px; }
      .rail li::before { left:50%; top:2px; transform:translateX(-50%); }
      .rail li::after { top:9px; bottom:auto; left:calc(50% + 10px); width:calc(100% - 20px); height:1px; }
      .phase { position:static; display:flex; align-items:center; gap:12px; margin:10px 0 18px; }
      .phase .big { margin:0; font-size:26px; }
      .work { padding:27px 22px 30px; border-radius:8px 25px 25px 8px; }
      .work .story { font-size:17px; }
      .known { grid-template-columns:1fr; }
      .answer-row { grid-template-columns:1fr; }
      .answer-row .button { width:100%; }
      .answer-note { padding-bottom:2px; }
      .feedback,.hint { margin-top:12px; padding:12px 14px; font-size:14px; }
      .ratio { margin-top:12px; }
      .ratio div { padding:10px 12px; }
      .result { margin-top:15px; padding:0 17px 110px; }
      .result-card { padding:31px 25px 28px; border-radius:9px 26px 26px 9px; }
      .result-card h1 { font-size:38px; }
      .evidence { grid-template-columns:1fr; gap:8px; margin:22px 0 24px; }
      .evidence div { display:flex; align-items:center; gap:12px; padding:12px 14px; }
      .evidence strong { min-width:58px; margin:0; }
      .result-foot { align-items:stretch; flex-direction:column; }
      .b-wrap { margin-top:14px; padding:0 15px 110px; }
      .tabs { overflow:hidden; padding-left:10px; }
      .spread { display:block; min-height:0; border-radius:24px; }
      .spread::after { display:none; }
      .page { padding:28px 24px; }
      .page:first-child { border-radius:24px 24px 0 0; }
      .page:last-child { border-top:1px dashed var(--line); border-radius:0 0 24px 24px; }
      .page.secondary-mobile { display:none; }
      .equation { margin:24px 0; font-size:29px; }
      .b-actions { align-items:stretch; flex-direction:column; }
      .b-actions .button { width:100%; }
      .route-map { margin-top:30px; padding-left:45px; }
      .stop { min-height:100px; padding-left:15px; }
      .stop::before { left:-39px; width:29px; height:29px; }
      .ticket { position:static; margin-top:8px; }
      .c-lesson { padding:0 15px 110px; }
      .c-task { grid-template-columns:1fr; gap:20px; padding:26px 22px; border-radius:24px; }
      .bottom { position:fixed; right:0; bottom:0; left:0; z-index:10; display:block; padding:10px 16px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:rgba(245,241,231,.94); backdrop-filter:blur(12px); }
      .bottom .button { width:100%; }
      .desktop-action { display:none; }
    }
  </style>
</head>
<body><div id="app"></div><script>
  const q=new URLSearchParams(location.search); const concept=q.get('concept')||'a'; const screen=q.get('screen')||'today';
  const topbar=`<header class="top"><div class="brand"><span class="seed"><b>к+</b></span>AiPlus</div><span class="mini">Твой маршрут к НИШ</span></header>`;
  const rail=`<ol class="rail"><li class="active">Разобрать</li><li>Доделать</li><li>Решить</li><li>Проверить</li></ol>`;
  const todayA=`<main class="a-main"><section class="a-contract"><p class="mark">Сегодня · урок 1 из 3</p><h1 style="margin-top:15px">Смеси и<br>концентрации</h1><p class="lead">Научишься пересчитывать концентрацию, когда воду добавили или выпарили.</p><div class="meta"><span>≈ 12 минут</span><span>1 пример + 3 задачи</span></div><button class="button desktop-action">Начать урок <span style="margin-left:22px">→</span></button></section><aside class="a-rail"><p class="rail-title">Как пройдёт урок</p>${rail}</aside></main><div class="bottom"><button class="button">Начать урок →</button></div>`;
  const lessonA=`<main class="a-lesson"><aside class="phase"><p class="mark">Фаза</p><p class="big">02/04</p><p class="mini">Доделываем вместе</p></aside><section class="work"><div class="progress"><span></span></div><p class="mark" style="margin-top:28px">Шаг 1 · масса вещества</p><h2 style="margin-top:12px">Что в смеси не изменилось?</h2><p class="story">Из 300 г двадцатипроцентного раствора выпарили 100 г воды. Найди новую концентрацию.</p><div class="known"><div><span class="mini">Было раствора</span><strong>300 г</strong></div><div><span class="mini">Концентрация</span><strong>20%</strong></div></div><p class="question">Сколько граммов вещества было в смеси до выпаривания?</p><div class="answer-row"><input class="input" placeholder="Введи массу вещества" /><button class="button desktop-action">Проверить</button></div></section></main><div class="bottom"><button class="button">Проверить</button></div>`;
  const wrongA=`<main class="a-lesson"><aside class="phase"><p class="mark">Фаза</p><p class="big">02/04</p><p class="mini">Доделываем вместе</p></aside><section class="work"><div class="progress"><span style="width:34%"></span></div><p class="mark" style="margin-top:26px">Шаг 1 · масса вещества</p><h2 style="margin-top:10px">Найди неизменную часть</h2><p class="story">В 300 г раствора — 20% вещества. Сколько это граммов?</p><div class="answer-row"><input class="input wrong" value="40 г" aria-label="Неверный ответ" /><button class="button desktop-action">Проверить ещё раз</button></div><div class="feedback"><strong>Пока не сходится</strong>40 г — это не 20% от 300 г. Проверь, сколько сотен в 300.</div><div class="hint"><strong>Опора после первой попытки</strong>В каждых 100 г раствора — 20 г вещества. Сколько таких частей в 300 г?</div></section></main><div class="bottom"><button class="button">Проверить ещё раз</button></div>`;
  const retryA=`<main class="a-lesson"><aside class="phase"><p class="mark">Фаза</p><p class="big">02/04</p><p class="mini">Вторая попытка</p></aside><section class="work"><div class="progress"><span style="width:34%"></span></div><p class="mark" style="margin-top:26px">Та же задача · больше опоры</p><h2 style="margin-top:10px">Собери отношение</h2><p class="story">В 300 г раствора — 20% вещества. Сколько это граммов?</p><div class="ratio"><div>Вся смесь</div><div><strong>Вещество</strong></div><div>100 г</div><div><strong>20 г</strong></div><div>300 г</div><div><strong>? г</strong></div></div><p class="question">Во сколько раз выросла масса всей смеси?</p><div class="answer-row"><input class="input" placeholder="Введи множитель" /><button class="button desktop-action">Продолжить</button></div><p class="answer-note">Потом применишь тот же множитель к массе вещества.</p></section></main><div class="bottom"><button class="button">Продолжить</button></div>`;
  const resumeA=`<main class="a-lesson"><aside class="phase"><p class="mark">Фаза</p><p class="big">02/04</p><p class="mini">Продолжаем с места</p></aside><section class="work"><div class="progress"><span style="width:48%"></span></div><span class="saved">Твой ответ 60 г сохранён</span><p class="mark" style="margin-top:18px">Шаг 2 · новая масса смеси</p><h2 style="margin-top:10px">После выпаривания</h2><p class="story">Из исходных 300 г выпарили 100 г воды. Масса вещества осталась 60 г.</p><div class="known"><div><span class="mini">Было смеси</span><strong>300 г</strong></div><div><span class="mini">Ушло воды</span><strong>100 г</strong></div></div><p class="question">Какой стала общая масса смеси?</p><div class="answer-row"><input class="input" placeholder="Новая масса, г" /><button class="button desktop-action">Проверить</button></div></section></main><div class="bottom"><button class="button">Проверить</button></div>`;
  const resultA=`<main class="result"><section class="result-card"><p class="mark">Урок завершён · evidence сохранён</p><h1 style="margin-top:15px">Ты сохранил<br>неизменную часть</h1><p class="lead" style="margin-top:22px">Теперь ты пересчитываешь концентрацию после добавления или выпаривания воды — без подсказок.</p><div class="evidence"><div><strong>2/2</strong><span class="mini">самостоятельные задачи</span></div><div><strong>1/1</strong><span class="mini">перенос в новой ситуации</span></div><div><strong>3</strong><span class="mini">шага объяснены верно</span></div></div><div class="result-foot"><span class="mini">Дальше: смешиваем два раствора</span><button class="button desktop-action">Вернуться в «Сегодня»</button></div></section></main><div class="bottom"><button class="button">Вернуться в «Сегодня»</button></div>`;
