<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <defs>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="2" seed="23" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="faint">
        <feFuncA type="table" tableValues="0 0.045"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faint" mode="multiply"/>
    </filter>
  </defs>
  <rect width="1000" height="700" fill="#f8f5eb" filter="url(#paper)"/>
  <g stroke="#a9c8dc" stroke-width="2" opacity="0.65">
    <path d="M0 145H1000M0 225H1000M0 305H1000M0 385H1000M0 465H1000M0 545H1000M0 625H1000"/>
  </g>
  <path d="M130 0V700" stroke="#e29b9b" stroke-width="3" opacity="0.75"/>
  <g transform="rotate(1 500 350)" fill="#223f72" font-family="Bradley Hand, Noteworthy, Comic Sans MS, cursive">
    <text x="180" y="125" font-size="42">Шаг 1</text>
    <text x="180" y="285" font-size="88" letter-spacing="3">63 + 28 = 92</text>
    <path d="M185 310 C330 323 585 318 825 313" fill="none" stroke="#223f72" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
