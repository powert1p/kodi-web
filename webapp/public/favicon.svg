<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Бренд-плитка: тёплый оранжевый с тонким светлым верхним бликом -->
  <rect width="512" height="512" rx="120" fill="#EA580C"/>
  <rect width="512" height="512" rx="120" fill="#ffffff" opacity="0.06"/>

  <!-- Маскот «Кёди»: росток-капля. Два листочка + тельце-капля, белым по оранжевому -->
  <!-- листочки -->
  <path d="M256 150 C 214 86, 124 86, 134 158 C 196 168, 244 156, 256 150 Z" fill="#4F9D00"/>
  <path d="M256 150 C 298 86, 388 86, 378 158 C 316 168, 268 156, 256 150 Z" fill="#3D7A00"/>
  <rect x="244" y="138" width="24" height="44" rx="12" fill="#3D7A00"/>

  <!-- тельце-капля (белая, читается как «семечко роста») -->
  <path d="M256 168
           C 360 168, 400 250, 400 312
           C 400 388, 338 428, 256 428
           C 174 428, 112 388, 112 312
           C 112 250, 152 168, 256 168 Z"
        fill="#ffffff"/>

  <!-- мимика: тёплые глаза + улыбка оранжевым -->
  <circle cx="212" cy="296" r="17" fill="#2B2724"/>
  <circle cx="300" cy="296" r="17" fill="#2B2724"/>
  <path d="M216 344 q40 34 80 0" fill="none" stroke="#EA580C" stroke-width="16" stroke-linecap="round"/>
  <!-- щёчки -->
  <circle cx="172" cy="332" r="14" fill="#EA580C" opacity="0.35"/>
  <circle cx="340" cy="332" r="14" fill="#EA580C" opacity="0.35"/>
</svg>
