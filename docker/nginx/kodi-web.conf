# kodi-web — host nginx vhost (REFERENCE; ставит root/Умид в /etc/nginx/sites-available/).
# App same-origin: FastAPI отдаёт и Flutter-статику, и /api/ — проксируем ВСЁ на один upstream.
# Порт 8300 — контейнер kodi-app (127.0.0.1 only). SSL — через certbot после выдачи домена.
# До установки vhost доступ к приложению — по SSH-туннелю: ssh -L 8300:127.0.0.1:8300 aiplus
#
# upstream: 127.0.0.1:8300  (docker-compose: app → 127.0.0.1:8300:8000)

server {
    listen 80;
    server_name kodi.aiplus.kz;   # TODO: подтвердить домен у владельца/Умида

    # certbot ACME-challenge (до выдачи сертификата)
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name kodi.aiplus.kz;   # TODO

    ssl_certificate     /etc/letsencrypt/live/kodi.aiplus.kz/fullchain.pem;   # certbot
    ssl_certificate_key /etc/letsencrypt/live/kodi.aiplus.kz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8300;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # Перезаписываем входной XFF: пользователь не может подложить IP слева.
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
