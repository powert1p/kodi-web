# kodi-web — self-hosted Docker Compose (по образцу CDP).
# Локально: docker compose up -d --build → http://127.0.0.1:8300/health
# На VPS: тот же файл, наружу через host nginx vhost → proxy_pass 127.0.0.1:8300.
# Секреты — в .env рядом (POSTGRES_PASSWORD, JWT_SECRET, BOT_TOKEN, ANTHROPIC_API_KEY).
services:
  postgres:
    image: postgres:17-alpine
    container_name: kodi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kodi}
      POSTGRES_USER: ${POSTGRES_USER:-kodi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    # Только localhost — порт 5435 (5432 системный, 5434 занят CDP). Проверить ss -ltn перед up.
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kodi} -d ${POSTGRES_DB:-kodi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kodi-internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kodi-app
    restart: unless-stopped
    mem_limit: 1g
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kodi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kodi}
      JWT_SECRET: ${JWT_SECRET}
      BOT_TOKEN: ${BOT_TOKEN:-}
      ADMIN_ID: ${ADMIN_ID:-0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VISION_PROVIDER: ${VISION_PROVIDER:-gemini}
      # owner-гейт выгрузки телеметрии (/api/trainer/events/export); 0 = выгрузка никому
      OWNER_STUDENT_ID: ${OWNER_STUDENT_ID:-0}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
      PORT: "8000"
    # Фото-датасет (детские работы) должен переживать rebuild контейнера
    volumes:
      - ./error_photos:/app/data/error_photos
    # Публично на 0.0.0.0:8300 (прямой биндинг, как kodi-cabinet:8301) — без nginx/root.
    # ⚠️ FastAPI смотрит в интернет напрямую: личные данные защищены JWT, регистрация публична by design.
    # TODO: убрать наружу за host nginx + SSL, когда будет домен/root.
    ports:
      - "0.0.0.0:8300:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=8).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kodi-internal

networks:
  kodi-internal:
    driver: bridge
